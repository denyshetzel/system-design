# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
    enabled: ${SPRINGDOCS_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  openapi:
    location: classpath:docs/openapi.yaml

# Async Configuration - NOT USED (we use custom virtual thread executor)
spring:
  threads:
    virtual:
      enabled: true

# Database Connection Pool Optimization
  datasource:
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 1800000
      validation-timeout: 5000
      leak-detection-threshold: 20000

# JPA Performance Settings
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration

# Internationalization Configuration
  messages:
    basename: i18n/messages
    encoding: UTF-8

server:
  servlet:
    context-path: /shortening/api
  error:
    include-message: ${SERVER_ERROR_INCLUDE_MESSAGE:always}
    include-stacktrace: ${SERVER_ERROR_INCLUDE_STACKTRACE:always}
  port: ${SERVER_PORT:8080}

# App config
app:
  application-description: '@project.description@'
  application-version: '@project.version@'
  base:
    url: ${APP_BASE_URL:http://localhost:8080}
