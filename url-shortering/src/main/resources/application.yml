spring:
  profiles:
    default: local

  threads:
    virtual:
      enabled: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    connect-retries: ${SPRING_FLYWAY_CONNECT_RETRIES:10}
    connect-retries-interval: ${SPRING_FLYWAY_CONNECT_RETRIES_INTERVAL:10s}

  datasource:
    driver-class-name: org.postgresql.Driver

  # JPA Performance Settings
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true

  # Internationalization Configuration
  messages:
    basename: i18n/messages
    encoding: UTF-8

springdoc:
  api-docs:
    path: /api-docs
    enabled: ${SPRINGDOCS_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  openapi:
    location: classpath:docs/openapi.yaml

server:
  servlet:
    context-path: /shortening/api
  error:
    include-message: ${SERVER_ERROR_INCLUDE_MESSAGE:never}
    include-stacktrace: ${SERVER_ERROR_INCLUDE_STACKTRACE:never}
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
  endpoint:
    health:
      probes:
        enabled: true

app:
  application-description: '@project.description@'
  application-version: '@project.version@'
  base:
    url: ${APP_BASE_URL:http://localhost:8080}
  rate-limit:
    create-per-minute: ${APP_RATE_LIMIT_CREATE_PER_MINUTE:60}
    redirect-per-minute: ${APP_RATE_LIMIT_REDIRECT_PER_MINUTE:300}
  cleanup:
    expired-urls-cron: ${APP_CLEANUP_EXPIRED_URLS_CRON:0 */15 * * * *}
  observability:
    request-log-sample-percent: ${APP_OBSERVABILITY_REQUEST_LOG_SAMPLE_PERCENT:1.0}
