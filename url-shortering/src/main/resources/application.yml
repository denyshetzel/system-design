# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
    enabled: ${SPRINGDOCS_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  openapi:
    location: classpath:docs/openapi.yaml

# Async Configuration - NOT USED (we use custom virtual thread executor)
spring:
  threads:
    virtual:
      enabled: true

# Database Connection Pool Optimization
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shortering-db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 1800000
      validation-timeout: 5000
      leak-detection-threshold: ${SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD:0}

# JPA Performance Settings
  jpa:
    open-in-view: false
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    connect-retries: ${SPRING_FLYWAY_CONNECT_RETRIES:10}
    connect-retries-interval: ${SPRING_FLYWAY_CONNECT_RETRIES_INTERVAL:10s}

# Internationalization Configuration
  messages:
    basename: i18n/messages
    encoding: UTF-8

server:
  servlet:
    context-path: /shortening/api
  error:
    include-message: ${SERVER_ERROR_INCLUDE_MESSAGE:never}
    include-stacktrace: ${SERVER_ERROR_INCLUDE_STACKTRACE:never}
  port: ${SERVER_PORT:8080}

# App config
app:
  application-description: '@project.description@'
  application-version: '@project.version@'
  base:
    url: ${APP_BASE_URL:http://localhost:8080}
